<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Login Aufgabe</title>
  <script src="inc/vue.global.js"></script>
  <link href="inc/bootstrap.min.css" rel="stylesheet">
  <style>
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>

  <div id="app" class="container col-sm-6 mt-4">
    <h2>Login</h2>

    <!-- Hier Elemente Einfügen! -->
    <div class="mb-3">
      <label for="email" class="form-label">E-Mail</label>
      <input
        type="email"
        id="email"
        class="form-control"
        v-model="email"
        placeholder="E-Mail eingeben"
        :disabled="loading"
        @keyup.enter="handleLogin"
      >
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Passwort</label>
      <input
        type="password"
        id="password"
        class="form-control"
        v-model="password"
        placeholder="Passwort eingeben"
        :disabled="loading"
        @keyup.enter="handleLogin"
      >
    </div>
    <button class="btn btn-primary w-100 mb-3" @click="handleLogin" :disabled="loading">
      <span v-if="loading">Laden&#8230;</span>
      <span v-else>Anmelden</span>
    </button>
    <p v-if="message" :class="isSuccess ? 'success' : 'error'">
      {{ message }}
    </p>
  </div>

  <script>
    // =========================
    // Fake API (NICHT ÄNDERN)
    // =========================
    async function loginApi(email, password) {
      console.log("API called with:", email, password);

      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (email === "test@test.com" && password === "1234") {
            resolve({ success: true, name: "Test User" });
          } else {
            reject({ success: false, message: "Invalid credentials" });
          }
        }, 1000);
      });
    }

    // =========================
    // AUFGABE
    // =========================
    /*
      Baue eine Login-UI, mit:

      1. Elemente:
         - email-Feld
         - Passwort-Feld
         - Login-Button

      2. Ruft loginApi(email, password) bei Klick auf

      3. Zeigt:
         - Erfolgsmeldung (z.B. "Willkommen Test User")
         - oder Fehlermeldung

      4. Bonus:
         - Schaltfläche beim Laden deaktivieren
         - grundlegende Validierung (leere Felder)
         - bessere Benutzerfreundlichkeit / Styling
    */

    // =========================
    // Vue App
    // =========================
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          email: "",
          password: "",
          message: "",
          loading: false,
          isSuccess: false,
        };
      },
      methods: {
        async handleLogin() {
          if (!this.email || !this.password) {
            this.isSuccess = false;
            this.message = "Bitte E-Mail und Passwort eingeben.";
            return;
          }
          this.loading = true;
          this.message = "";
          try {
            const result = await loginApi(this.email, this.password);
            this.isSuccess = true;
            this.message = `Willkommen ${result.name}`;
          } catch (error) {
            this.isSuccess = false;
            this.message = error.message;
          } finally {
            this.loading = false;
          }
        },
      },
    }).mount("#app");

  </script>

</body>
</html>
