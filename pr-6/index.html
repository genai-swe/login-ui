<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Login Aufgabe</title>
  <script src="inc/vue.global.js"></script>
  <link href="inc/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }
    .login-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 2rem;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>

  <div id="app" class="container col-sm-6 mt-4">
    <div class="login-card">
      <h2 class="mb-4">Login</h2>

      <form @submit.prevent="handleLogin">
        <div class="mb-3">
          <label for="email" class="form-label">E-Mail</label>
          <input
            id="email"
            v-model.trim="email"
            type="email"
            class="form-control"
            placeholder="test@test.com"
            autocomplete="email"
          >
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Passwort</label>
          <input
            id="password"
            v-model="password"
            type="password"
            class="form-control"
            placeholder="1234"
            autocomplete="current-password"
          >
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
          :disabled="loading"
        >
          {{ loading ? "Anmeldung läuft..." : "Einloggen" }}
        </button>
      </form>

      <p v-if="message" class="mt-3 mb-0" :class="isSuccess ? 'success' : 'error'">
        {{ message }}
      </p>
    </div>
  </div>

  <script>
    // =========================
    // Fake API (NICHT ÄNDERN)
    // =========================
    async function loginApi(email, password) {
      console.log("API called with:", email, password);

      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (email === "test@test.com" && password === "1234") {
            resolve({ success: true, name: "Test User" });
          } else {
            reject({ success: false, message: "Invalid credentials" });
          }
        }, 1000);
      });
    }

    // =========================
    // AUFGABE
    // =========================
    /*
      Baue eine Login-UI, mit:

      1. Elemente:
         - email-Feld
         - Passwort-Feld
         - Login-Button

      2. Ruft loginApi(email, password) bei Klick auf

      3. Zeigt:
         - Erfolgsmeldung (z.B. "Willkommen Test User")
         - oder Fehlermeldung

      4. Bonus:
         - Schaltfläche beim Laden deaktivieren
         - grundlegende Validierung (leere Felder)
         - bessere Benutzerfreundlichkeit / Styling
    */

    // =========================
    // Vue App
    // =========================
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          email: "",
          password: "",
          message: "",
          loading: false,
          isSuccess: false,
        };
      },
      methods: {
        async handleLogin() {
          if (!this.email || !this.password) {
            this.isSuccess = false;
            this.message = "Bitte E-Mail und Passwort eingeben.";
            return;
          }

          this.loading = true;
          this.message = "";
          try {
            const result = await loginApi(this.email, this.password);
            this.isSuccess = true;
            this.message = `Willkommen ${result.name}`;
          } catch (error) {
            this.isSuccess = false;
            this.message = error.message;
          } finally {
            this.loading = false;
          }
        },
      },
    }).mount("#app");

  </script>

</body>
</html>
