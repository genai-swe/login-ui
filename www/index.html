<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Login Aufgabe</title>
  <script src="inc/vue.global.js"></script>
  <link href="inc/bootstrap.min.css" rel="stylesheet">
  <style>
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>

<div id="app" class="container col-sm-6 mt-4">
  <h2>Login</h2>

  <!-- Email -->
  <div class="mb-3">
    <label class="form-label">E-Mail</label>
    <input
      type="email"
      class="form-control"
      v-model="email"
      placeholder="test@test.com">
  </div>

  <!-- Passwort -->
  <div class="mb-3">
    <label class="form-label">Passwort</label>
    <input
      type="password"
      class="form-control"
      v-model="password"
      placeholder="1234">
  </div>

  <!-- Login Button -->
  <button
    class="btn btn-primary"
    @click="handleLogin"
    :disabled="loading">
    {{ loading ? "Lädt..." : "Login" }}
  </button>

  <!-- Meldung -->
  <p class="mt-3" v-if="message" :class="isSuccess ? 'success' : 'error'">
    {{ message }}
  </p>

</div>

<script>
  // =========================
  // Fake API (NICHT ÄNDERN)
  // =========================
  async function loginApi(email, password) {
    console.log("API called with:", email, password);

    return new Promise((resolve, reject) => {
      setTimeout(() => {
        if (email === "test@test.com" && password === "1234") {
          resolve({ success: true, name: "Test User" });
        } else {
          reject({ success: false, message: "Invalid credentials" });
        }
      }, 1000);
    });
  }

  const { createApp } = Vue;

  createApp({
    data() {
      return {
        email: "",
        password: "",
        message: "",
        loading: false,
        isSuccess: false,
      };
    },

    methods: {
      async handleLogin() {

        // Validierung
        if (!this.email || !this.password) {
          this.isSuccess = false;
          this.message = "Bitte E-Mail und Passwort eingeben.";
          return;
        }

        this.loading = true;
        this.message = "";

        try {
          const result = await loginApi(this.email, this.password);

          this.isSuccess = true;
          this.message = `Willkommen ${result.name}`;

        } catch (error) {

          this.isSuccess = false;
          this.message = error.message;

        } finally {

          this.loading = false;

        }
      }
    }
  }).mount("#app");
</script>

</body>
</html>
